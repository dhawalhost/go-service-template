run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - gofmt
    - goimports
    - unparam
    - bodyclose
    - noctx
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/dhawalhost/go-service-template
