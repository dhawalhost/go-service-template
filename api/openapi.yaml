openapi: "3.0.3"
info:
  title: Go Service Template API
  description: |
    Production-ready Go microservice template API.
    Replace "examples" with your domain entity.
  version: "1.0.0"
  contact:
    name: API Support
    url: https://github.com/dhawalhost/go-service-template

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: examples
    description: Example resource CRUD operations
  - name: health
    description: Health check endpoints

paths:
  /health/live:
    get:
      summary: Liveness probe
      description: Returns 200 if the service is running.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is alive

  /health/ready:
    get:
      summary: Readiness probe
      description: Returns 200 if all dependencies (DB, Redis) are healthy.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/examples:
    get:
      summary: List examples
      description: Returns a paginated list of examples for the authenticated tenant.
      tags: [examples]
      parameters:
        - $ref: "#/components/parameters/RequestID"
        - $ref: "#/components/parameters/TenantID"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of examples
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExamplesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Create example
      description: Creates a new example for the authenticated tenant.
      tags: [examples]
      parameters:
        - $ref: "#/components/parameters/RequestID"
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExampleRequest"
      responses:
        "201":
          description: Example created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExampleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/examples/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: "#/components/parameters/RequestID"
      - $ref: "#/components/parameters/TenantID"

    get:
      summary: Get example
      description: Returns a single example by ID.
      tags: [examples]
      responses:
        "200":
          description: Example found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExampleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      summary: Update example
      description: Updates an existing example.
      tags: [examples]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExampleRequest"
      responses:
        "200":
          description: Example updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExampleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Delete example
      description: Soft-deletes an example.
      tags: [examples]
      responses:
        "204":
          description: Example deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RequestID:
      name: X-Request-ID
      in: header
      schema:
        type: string
        format: uuid
      description: Optional client-supplied request identifier for tracing.

    TenantID:
      name: X-Tenant-ID
      in: header
      schema:
        type: string
      description: Tenant identifier for multi-tenant scoping.

  schemas:
    Example:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        tenant_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, tenant_id, created_at, updated_at]

    ExampleResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Example"

    PaginatedExamplesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Example"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    CreateExampleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000

    UpdateExampleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional error details
        request_id:
          type: string
          format: uuid
          description: Request identifier for tracing
      required: [code, message, request_id]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
