{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "service.fullname" . }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
rules:
# Allow reading ConfigMaps used for application configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Allow reading Secrets (e.g., database credentials, API keys)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
{{- end }}
