server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 30s

database:
  dsn: postgres://pguser:password@postgres:5432/service_db?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  migrations_path: /migrations

redis:
  addr: redis:6379
  password: ""
  db: 0

jwt:
  secret: change-me-in-production
  expiry: 24h
  issuer: go-service-template

log:
  level: info
  development: false

telemetry:
  enabled: false
  service_name: go-service-template

cors:
  allowed_origins:
    - "http://localhost:3000"

